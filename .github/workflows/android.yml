name: Build Android APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Get the code
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install dependencies
        run: npm install

      - name: Add the Android project
        run: npx cap add android

      - name: Add Firebase config for push
        run: cp google-services.json android/app/google-services.json

      - name: Sync web assets into Android
        run: npx cap sync android

      - name: Add the notification icon
        run: |
          mkdir -p android/app/src/main/res/drawable
          cp resources/ic_stat_icon.png android/app/src/main/res/drawable/ic_stat_icon.png

      - name: Add exact-alarm permissions (reliable on-time reminders)
        run: |
          MANIFEST=android/app/src/main/AndroidManifest.xml
          sed -i 's#</manifest>#    <uses-permission android:name="android.permission.SCHEDULE_EXACT_ALARM" />\n    <uses-permission android:name="android.permission.USE_EXACT_ALARM" />\n</manifest>#' "$MANIFEST"
          echo "----- AndroidManifest.xml after patch -----"
          cat "$MANIFEST"

      - name: Build the debug APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon

      - name: Upload the APK
        uses: actions/upload-artifact@v4
        with:
          name: nanda-tasks-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error
